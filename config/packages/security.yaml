security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        legacy:
            algorithm: sha512
            encode_as_base64: false
            iterations: 1

        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\DfxNfxUser:
            algorithm: auto
            migrate_from:
                - bcrypt # uses the "bcrypt" hasher with the default options
                - legacy # uses the "legacy" hasher configured above
    role_hierarchy:
        ROLE_SUPER_ADMIN: [ ROLE_DFX_META, ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH ]
        ROLE_DFX_META: [ROLE_DFX_GROUP, ROLE_DFX_META_PUB, ROLE_DFX_GROUP_PUB]
        ROLE_DFX_GROUP: [ROLE_DFX_GROUP_PUB]
        ROLE_ADMIN: [ ROLE_USER, ROLE_DFX_ALL, ROLE_DFX_PUB, ROLE_NFX_ALL, ROLE_NFX_PUB ]

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\DfxNfxUser
                property: username
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            form_login:
                # "app_login" is the name of the route created previously
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: /admin
            lazy: true
            provider: app_user_provider
            logout:
                path: app_logout
                target: app_login
            switch_user: true
                # where to redirect after logout
                # target: app_any_route

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
    # - { path: ^/admin, roles: ROLE_ADMIN }
    # - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/resetting, roles: PUBLIC_ACCESS }
        - { path: ^/admin, role: ROLE_USER }
    access_denied_url: /login