tf-text1: <h4>Enter single date</h4><p>Single dates are events that take place once in a day or extend over several days, but are to be regarded as one event - such as a seminar or a trip of several days. <strong>Multi-day single dates appear in the calendar only with the start date </strong> </p>
tf-text2: <h3>Enter recurring dates</h3><p>Recurring dates are single dates, that take place in a certain period of time regularly or repeat themselves at irregular intervals. This can be exhibitions or a Christmas market that takes place every day for a certain period. Recurring dates appear on all days in the calendar and can be edited individually or in bundles after being entered.
tf-text3: <h4>Regular dates</h4><p>Enter a start and end date and then mark the days on which the appointment takes place. The determined days are automatically entered in the list field for the regular recurring dates that appear in the next line and can be edited by hand if necessary. </p>
tf-text4: <h4>Irregular date</h4><p>Irregular dates can be recorded using the calendar linked to the list field. Click on the days on which the date should appear. You can also continue the entry beyond monthly limits by changing the months with the << >> keys.</p>
