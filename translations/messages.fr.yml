tf-text1: <h4>Saisie date unique </h4><p> Les dates uniques sont des manifestations qui ont lieu une fois à une date donnée ou sur plusieurs jours lorsqu’ils sont considérés comme une seule manifestation, comme par exemple des séminaires ou des voyages de plusieurs jours. Les dates uniques se déroulant sur plusieurs jours apparaisse à la date de début dans le calendrier.
tf-text2: <h3>Saisie dates multiples</h3><p>Les dates multiples sont des dates uniques qui ont lieu régulièrement pendant une période donnée ou qui se répètent à intervalles irréguliers. Il peut s’agir d’expositions ou de marchés de noël qui ont lieu quotidiennement pendant un laps de temps donné. Les dates multiples apparaissent tous les jours dans le calendrier et peuvent être traité à l’unité ou en groupe après la saisie.
tf-text3: <h4>Date régulière</h4><p>Saisissez une date de début et de fin et marquez les jours où ont lieu la manifestation. Le jours déterminés sont repris automatiquement dans le champ liste de la ligne suivante et peuvent être modifié à la main si nécessaire. </p>
tf-text4: <h4>Dates irrégulières</h4><p>Les dates ayant lieu de façon irrégulières peuvent être saisie grâce au champ liste lié au calendrier. Cliquez sur les jours concernés par la manifestation. Vous pouvez aussi poursuivre la saisie au-delà des limites du mois en changeant de mois avec les touches << >></p> 
