tf-text1: <h4>Eingabe Einzeltermine</h4><p>Einzeltermine sind Veranstaltungen, die einmalig an einem Tag stattfinden oder sich über mehrere Tage erstrecken, aber als eine Veranstaltung zu betrachten sind - wie zum Beispiel ein Seminar oder eine mehrtägige Reise. <strong>Mehrtägige Einzeltermine erscheinen nur mit dem Anfangsdatum im Kalender</strong></p>
tf-text2: <h3>Eingabe Serientermine</h3><p>Serientermine sind Einzeltermine, die in einem bestimmten Zeitraum regelmäßig stattfinden oder sich in unregelmäßigen Abständen wiederholen. Das können Ausstellungen sein oder ein Weihnachtsmarkt, der über einen bestimmten Zeitraum täglich stattfindet. Serientermine erscheinen an allen Tagem im Kalender und können nach der Eingabe einzeln oder gebündelt bearbeitet werden.
tf-text3: <h4>Regelmäßiger Termin</h4><p>Geben Sie ein Start- und Enddatum an und markieren dann die Tage, an denen der Termin stattfindet. Die ermittelten Tage werden automatisch in das in der nächsten Zeile erscheinende Listenfeld für die regelmäßigen Serientermine eingetragen und können ggf. von Hand nachbearbeitet werden.</p>
tf-text4: <h4>Unregelmäßiger Termin</h4><p>Unregelmäßig stattfindende Termine können über den mit dem Listenfeld verknüpften Kalender erfasst werden. Klicken Sie auf die Tage, an denen der Termin erscheinen soll. Sie können die Eingabe auch über Monatsgrenzen hinweg fortsetzen, indem Sie mit den << >> Tasten die Moante wechseln.</p> 
